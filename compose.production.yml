# compose.production.yml — Production hardening overlay.
#
# Usage: docker compose -f compose.yml -f compose.production.yml up -d
#
# Single-service hardened deployment: read-only root FS, dropped capabilities,
# tmpfs scratch, resource limits, log rotation. Self-hosted on user's machine —
# no reverse proxy assumed (user supplies their own TLS termination if exposing
# beyond localhost).

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

services:
  app:
    image: ${DOCKER_REGISTRY:-ghcr.io/sattva2020}/${DOCKER_IMAGE:-myhealth-europe}:${VERSION:?VERSION is required}
    build: !reset null                           # Never rebuild in production — pull from registry
    pull_policy: always
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE                         # Needed only if rebinding to <1024 port
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 100
        reservations:
          cpus: "0.1"
          memory: 64M
    logging: *default-logging
    restart: unless-stopped
    # Bind to localhost only by default — user explicitly enables external access.
    ports: !override
      - "127.0.0.1:${APP_PORT:-7777}:7777"
